<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meine Bibliothek</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px;
      box-sizing: border-box;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .top h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .top p {
      margin: 0;
      color: rgba(255,255,255,0.78);
      line-height: 1.5;
    }

    .logout-btn {
      padding: 12px 18px;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      background: #232323;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .card {
      background: #151515;
      border: 1px solid #262626;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      padding: 16px;
      box-sizing: border-box;
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      margin-bottom: 14px;
      background: #111;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.3;
    }

    .card p {
      margin: 0 0 12px;
      color: rgba(255,255,255,0.82);
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #f0b90b;
      color: #111;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      margin-top: 10px;
      font-size: 15px;
    }

    .btn-open {
      background: #58d68d;
      color: #111;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .status.pending {
      color: #ffd166;
    }

    .status.paid {
      color: #58d68d;
    }

    .loading {
      color: rgba(255,255,255,0.7);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Meine Bibliothek</h1>
        <p>Vorschau lesen, dann kaufen, dann Freischaltung erhalten.</p>
      </div>

      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="books" class="grid"></div>
    <p id="loading" class="loading">Bücher werden geladen ...</p>
  </div>

  <script src="app.js"></script>

  <script>
    async function initLibrary() {
      const user = await requireUser();
      if (!user) return;

      await loadBooksAndPurchases();

      const loading = document.getElementById("loading");
      if (loading) loading.style.display = "none";
    }

    initLibrary();
  </script>
</body>
</html>
