<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Das Universum als lebendiges Wesen</title>
  <link rel="stylesheet" href="book.css">
</head>

<body>
  <div class="wrap">

    <div class="topbar">
      <a class="back-btn" href="/reader/">← Zur Bibliothek</a>
    </div>

    <div class="hero">
      <img src="universum.jpg">
      <div class="info-box">
        <h2>Das Universum als lebendiges Wesen</h2>
        <p>Eine Reise durch Bewusstsein, Liebe und den Ursprung allen Seins.</p>
      </div>
    </div>

    <div class="paywall-box" id="gate-universum">
      <h3>Zugang freischalten</h3>

      <p>
        Kaufpreis: <b>7,99 €</b><br><br>
        Bitte bei PayPal im Hinweis angeben:<br>
        <b>Universum</b>
      </p>

      <div class="pay-row">
        <a class="pay-btn" href="https://paypal.me/Mayer68/7.99" target="_blank">
          Mit PayPal kaufen
        </a>
      </div>

      <div class="pay-row">
        <input class="pay-input" id="pw-universum" type="password" placeholder="Passwort eingeben">
        <button class="pay-btn pay-btn-secondary" onclick="unlockBook('universum')">
          Freischalten
        </button>
      </div>

      <div class="error-msg" id="error-universum">
        Passwort falsch
      </div>
    </div>

    <div class="reader-box" id="reader-universum" style="display:none;">
      <iframe class="pdf-frame"
        src="das-universum-als-lebendiges-wesen.pdf#toolbar=0">
      </iframe>
    </div>

  </div>

  <script src="access.js"></script>
  <script>
    restoreBookAccess("universum");
  </script>
</body>
</html>
